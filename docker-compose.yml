services:
  db:
    image: postgres:15-alpine
    container_name: k2_erp_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: k2_erp_web
    restart: always
    command: python -m flask run --host=0.0.0.0 --port=5000
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - FLASK_APP=${FLASK_APP}
    volumes:
      - .:/app
      - /app/.venv 
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: k2_erp_frontend
    restart: always
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules 
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - web

volumes:
  postgres_data: